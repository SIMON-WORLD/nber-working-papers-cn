name: Update NBER site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download NBER metadata
        run: python scripts/download_nber_metadata.py --output data/nber

      - name: Build site
        run: python scripts/build_site.py --source sources/monthly_ready --metadata-source data/nber

      - name: Commit updated site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update NBER site"
          file_pattern: "docs data/nber"
