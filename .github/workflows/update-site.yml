name: Update NBER site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download NBER metadata
        run: python scripts/download_nber_metadata.py --output data/nber

      - name: Translate latest weekly issue
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/translate_weekly.py --metadata-source data/nber --cache data/translations/nber_weekly_zh.json

      - name: Build site
        run: python scripts/build_site.py --source sources/monthly_ready --metadata-source data/nber --translation-cache data/translations/nber_weekly_zh.json

      - name: Upload site preview
        uses: actions/upload-artifact@v4
        with:
          name: nber-site-preview
          path: docs
          retention-days: 14

      - name: Commit updated site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update NBER site"
          file_pattern: "docs data/translations"
